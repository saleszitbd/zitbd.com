<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
<style>

* { box-sizing: border-box; }

body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #1f4037);
  background-size: 400% 400%;
  animation: gradientMove 15s ease infinite;
  color: #fff;
  text-align: center;
  padding: 40px 20px;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

.wrapper {
  max-width: 800px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(15px);
  padding: 50px 30px;
  border-radius: 25px;
  box-shadow: 0 25px 50px rgba(0,0,0,0.5);
  margin-bottom: 30px;
}

h1 {
  font-size: 50px;
  margin-bottom: 10px;
  font-weight: 800;
  letter-spacing: 3px;
}

.subtitle {
  font-size: 18px;
  opacity: 0.85;
  margin-bottom: 25px;
}

.price {
  font-size: 42px;
  color: #00ffd5;
  margin: 20px 0;
  font-weight: 700;
}

.buttons {
  margin-top: 25px;
}

.btn {
  display: inline-block;
  padding: 14px 32px;
  margin: 8px;
  border-radius: 50px;
  text-decoration: none;
  font-weight: 600;
  transition: 0.3s;
}

.btn-buy {
  background: #00ffd5;
  color: #000;
}

.btn-buy:hover { background: #00c9aa; }

.btn-offer {
  border: 2px solid #00ffd5;
  color: #00ffd5;
}

.btn-offer:hover {
  background: #00ffd5;
  color: #000;
}

/* Contact Card */

.contact-card h2 {
  margin-bottom: 20px;
  font-weight: 600;
}

.contact-info {
  font-size: 16px;
  line-height: 2;
}

.contact-info a {
  color: #00ffd5;
  text-decoration: none;
}

.contact-info a:hover {
  text-decoration: underline;
}

.whatsapp-btn {
  margin-top: 20px;
  display: inline-block;
  background: #25D366;
  color: #fff;
  padding: 12px 28px;
  border-radius: 40px;
  text-decoration: none;
  font-weight: 600;
}

.whatsapp-btn:hover {
  background: #1ebd5a;
}

.footer {
  margin-top: 20px;
  font-size: 13px;
  opacity: 0.7;
}

@media(max-width:768px){
  h1 { font-size: 34px; }
  .price { font-size: 30px; }
}

</style>
</head>
<body>

<div class="wrapper">

  <!-- Main Domain Card -->
  <div class="card">

    </div>

    </div>

    </div>

    </a>
